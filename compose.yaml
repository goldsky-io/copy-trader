# Copy-trader Compose app.
# Rename `name:` below if you want a custom app name — and remember to update
# the webhook URL in pipeline/polymarket-ctf-events.yaml to match.
name: "copy-trader"
api_version: "preview"
secrets:
  - PRIVATE_KEY
env:
  cloud:
    # Size of each copy trade. \$1 is the Polymarket minimum notional.
    TRADE_AMOUNT_USD: "1"

    # Shared Goldsky-hosted proxy. Polymarket geo-blocks the US; this forwards
    # from an EU IP. You can point at your own proxy if you prefer.
    CLOB_HOST: "https://fly-polymarket-proxy.fly.dev"
    GAMMA_HOST: "https://gamma-api.polymarket.com"

    # Wallets to mirror. Must match the `watched_fills` filter in the pipeline.
    # Example defaults — replace with your own picks. See
    # docs/solutions/integration-issues/finding-profitable-polymarket-traders.md
    # for the methodology.
    WATCHED_WALLETS: "0x48de48b1ee7db2de50d5a4eefe267c0d486295ba,0xbb947a6a8ec8748ea79bff2f968dee29fe85243c"
tasks:
  - name: "copy_trade"
    path: "./src/tasks/copy_trade.ts"
    triggers:
      - type: "http"
        authentication: "auth_token"
  - name: "setup_approvals"
    path: "./src/tasks/setup_approvals.ts"
    triggers:
      - type: "http"
        authentication: "auth_token"
  - name: "status"
    path: "./src/tasks/status.ts"
    triggers:
      - type: "http"
        authentication: "auth_token"
  - name: "redeem"
    path: "./src/tasks/redeem.ts"
    triggers:
      - type: "cron"
        expression: "0 */5 * * * *"
      - type: "http"
        authentication: "auth_token"
