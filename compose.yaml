name: "bot-composer"
api_version: "stable"
secrets:
  - PRIVATE_KEY
env:
  cloud:
    TRADE_AMOUNT_USD: "50"
    MAX_BUDGET_USD: "1000"
    CLOB_HOST: "https://clob.polymarket.com"
    GAMMA_HOST: "https://gamma-api.polymarket.com"
tasks:
  - name: "copy_trade"
    path: "./src/tasks/copy_trade.ts"
    triggers:
      - type: "http"
        authentication: "auth_token"
  - name: "redeem"
    path: "./src/tasks/redeem.ts"
    triggers:
      - type: "cron"
        expression: "0 */5 * * * *"
      - type: "http"
        authentication: "auth_token"
