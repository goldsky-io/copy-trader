name: polymarket-ctf-events
resource_size: s
description: "Index Polymarket CTF Exchange fills for watched wallets → webhook to Compose"

sources:
  poly_logs:
    type: dataset
    dataset_name: matic.raw_logs
    version: 1.0.0
    start_at: latest
    # V2 cutover (2026-04-28). V1 exchanges
    # 0x4bfb...82e (CTF) and 0xc5d5...80a (NegRisk) are dead — V1-signed orders
    # are no longer accepted, so any future logs from those addresses are
    # post-mortem and irrelevant to the copy bot.
    filter: >-
      address IN (
        '0xe111180000d2663c0091e4f400237545b87b996b',
        '0xe2222d279d744050d28e00520010520000310f59'
      )

transforms:
  decoded_fills:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        block_number,
        log_index,
        transaction_hash,
        to_timestamp(block_timestamp) AS block_timestamp,
        evm_log_decode(
          '[{"anonymous":false,"inputs":[{"indexed":true,"name":"orderHash","type":"bytes32"},{"indexed":true,"name":"maker","type":"address"},{"indexed":true,"name":"taker","type":"address"},{"indexed":false,"name":"side","type":"uint8"},{"indexed":false,"name":"makerAssetId","type":"uint256"},{"indexed":false,"name":"takerAssetId","type":"uint256"},{"indexed":false,"name":"makerAmountFilled","type":"uint256"},{"indexed":false,"name":"takerAmountFilled","type":"uint256"},{"indexed":false,"name":"signature1","type":"bytes32"},{"indexed":false,"name":"signature2","type":"bytes32"}],"name":"OrderFilled","type":"event"}]',
          topics,
          `data`
        ) AS `decoded`
      FROM poly_logs

  order_fills:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        block_number,
        log_index,
        transaction_hash,
        block_timestamp,
        LOWER(`decoded`.event_params[2]) AS maker,
        LOWER(`decoded`.event_params[3]) AS taker,
        CAST(`decoded`.event_params[4] AS INTEGER) AS side,
        `decoded`.event_params[5] AS token_id,
        CAST(`decoded`.event_params[6] AS DOUBLE) / 1e6 AS maker_amount,
        CAST(`decoded`.event_params[7] AS DOUBLE) / 1e6 AS taker_amount
      FROM decoded_fills
      WHERE `decoded`.event_signature = 'OrderFilled'

  # Filter to only watched wallets.
  # REPLACE THESE ADDRESSES — must match WATCHED_WALLETS in compose.yaml.
  # Example defaults shown (7 high-win-rate traders as of 2026-04-18).
  watched_fills:
    type: sql
    primary_key: id
    sql: |
      SELECT * FROM order_fills
      WHERE maker IN (
        '0x48de48b1ee7db2de50d5a4eefe267c0d486295ba',
        '0xbb947a6a8ec8748ea79bff2f968dee29fe85243c'
      )
      OR taker IN (
        '0x48de48b1ee7db2de50d5a4eefe267c0d486295ba',
        '0xbb947a6a8ec8748ea79bff2f968dee29fe85243c'
      )

sinks:
  # REPLACE the app name in the URL below if you renamed the Compose app.
  # Default matches compose.yaml's `name: "copy-trader"`.
  copy_trade_webhook:
    type: webhook
    from: watched_fills
    url: https://api.goldsky.com/api/admin/compose/v1/copy-trader/tasks/copy_trade
    secret_name: COMPOSE_WEBHOOK_AUTH
    one_row_per_request: true
